<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTMLS Runner - HTMLWARE</title>
    <style>
        :root {
            --accent: #28a745;
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --text: #ffffff;
            --glow: #39ff14;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 95%; max-width: 1200px; }
        h2 { color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 10px rgba(40,167,69,0.3); }
        
        #editor { 
            width: 100%; height: 450px; 
            background: var(--panel); color: #00ff41; 
            border: 1px solid #333; border-radius: 8px; 
            padding: 15px; font-family: 'Consolas', monospace;
            font-size: 14px; outline: none; box-sizing: border-box;
            line-height: 1.5;
        }
        
        .controls { margin: 20px 0; display: flex; gap: 12px; flex-wrap: wrap; }
        
        button { 
            padding: 12px 24px; cursor: pointer; border: none; 
            border-radius: 6px; font-weight: bold; transition: all 0.2s; 
        }
        
        .btn-run { background: var(--accent); color: white; flex-grow: 2; font-size: 1.1em; }
        .btn-run:hover { background: #2ecc71; transform: scale(1.02); }
        .btn-util { background: #333; color: white; }
        .btn-clear { background: #600; color: white; }

        #sim-container {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999;
        }
        
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10001;
            transition: opacity 0.5s ease-out;
        }
        .loader-text-top { font-size: 52px; font-weight: 900; color: var(--accent); letter-spacing: 8px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(40, 167, 69, 0.5); }
        .loader-text-sub { font-size: 14px; color: #666; letter-spacing: 4px; margin-bottom: 30px; text-transform: uppercase; }

        .progress-box { width: 300px; height: 6px; background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--glow); transition: width 0.1s linear; }

        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        .exit-btn {
            position: fixed; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 10px 20px; border-radius: 4px; z-index: 10002;
            border: 1px solid #444; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>HTMLS RUNNER</h2>
        <textarea id="editor" spellcheck="false" oninput="updateCount()" placeholder="Paste HTML code here..."></textarea>
        <div id="charCount" style="color:#666; font-size:12px; margin-top:5px;">Data Size: 0 chars</div>

        <div class="controls">
            <button class="btn-run" onclick="runSim()">▶ RUN HTMLS</button>
            <button class="btn-util" onclick="saveHTML()">💾 SAVE</button>
            <button class="btn-util" onclick="document.getElementById('f').click()">📂 LOAD</button>
            <button class="btn-clear" onclick="clearEditor()">🗑 CLEAR</button>
            <input type="file" id="f" style="display:none" accept=".html,.htm" onchange="loadHTML(event)">
        </div>
    </div>

    <div id="sim-container">
        <div id="loading-screen">
            <div class="loader-text-top">HTMLWARE</div>
            <div class="loader-text-sub">RUN HTMLS FASTER</div>
            <div class="progress-box">
                <div id="progress-bar"></div>
            </div>
        </div>
        
        <button class="exit-btn" onclick="exitSim()">EXIT (ESC)</button>
        <iframe id="viewer"></iframe>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const simContainer = document.getElementById('sim-container');
        const loadingScreen = document.getElementById('loading-screen');
        const progressBar = document.getElementById('progress-bar');
        const viewer = document.getElementById('viewer');

        // Hello World Template
        const helloWorldTemplate = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #000; 
            color: #28a745; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            font-family: sans-serif;
        }
        h1 { font-size: 5rem; text-shadow: 0 0 20px #28a745; }
        p { font-size: 1.5rem; opacity: 0.7; }
    </style>
</head>
<body>
    <h1>HELLO WORLD</h1>
    <p>HTMLWARE IS ACTIVE</p>
</body>
</html>`;

        // Load Hello World on Startup
        window.onload = () => {
            editor.value = helloWorldTemplate;
            updateCount();
        };

        function updateCount() {
            document.getElementById('charCount').innerText = "Data Size: " + editor.value.length.toLocaleString() + " chars";
        }

        function runSim() {
            if(!editor.value) return;
            progressBar.style.width = "0%";
            simContainer.style.display = 'block';
            loadingScreen.style.opacity = '1';
            loadingScreen.style.display = 'flex';
            viewer.srcdoc = ""; 

            if (simContainer.requestFullscreen) simContainer.requestFullscreen();

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    startInjection();
                } else {
                    width += Math.random() * 20;
                    if(width > 100) width = 100;
                    progressBar.style.width = width + "%";
                }
            }, 100);
        }

        function startInjection() {
            viewer.srcdoc = editor.value;
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
            }, 600);
        }

        function exitSim() {
            viewer.srcdoc = ""; 
            viewer.src = "about:blank"; 
            simContainer.style.display = 'none';
            if (document.fullscreenElement) document.exitFullscreen();
        }

        function clearEditor() {
            if(confirm("Clear all code?")) {
                editor.value = "";
                updateCount();
            }
        }

        function saveHTML() {
            if(!editor.value) return;
            const blob = new Blob([editor.value], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "htmlware_export.html";
            a.click();
        }

        function loadHTML(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (i) => {
                editor.value = i.target.result;
                updateCount();
            };
            reader.readAsText(file);
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) exitSim();
        });
    </script>
</body>
</html>
